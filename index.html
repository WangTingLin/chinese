<!doctype html>
<html lang="zh-TW">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- PWA / iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="中文研究室" />
    <meta name="theme-color" content="#1c1c1e" />
    <title>中文研究室</title>
  </head>
  <body class="bg-slate-50">
    <script>try{var _app=((window.Capacitor&&window.Capacitor.isNativePlatform())||window.navigator.standalone===true||(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches));if(_app){document.documentElement.style.background='#1c1c1e';document.documentElement.classList.add('is-native');document.body.style.background='#1c1c1e';}}catch(e){}</script>
    <div id="root"></div>
    <script>
      /* 最底層錯誤攔截：在 React 掛載前就能顯示錯誤 */
      window.__earlyErrors = [];
      window.onerror = function(msg, src, line, col, err) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;inset:0;background:#1c1c1e;color:#fff;padding:2rem;font-family:system-ui;z-index:99999;overflow:auto';
        d.innerHTML = '<b style="font-size:1.1rem">⚠️ 錯誤（請截圖回報）</b><br><br>' +
          '<code style="font-size:0.75rem;word-break:break-all;white-space:pre-wrap">' +
          (msg||'') + '\n\n' + (src||'') + ':' + (line||'') + ':' + (col||'') +
          (err&&err.stack ? '\n\n' + err.stack : '') + '</code>';
        document.body.appendChild(d);
      };
      window.onunhandledrejection = function(e) {
        window.onerror && window.onerror(String(e.reason), 'Promise', 0, 0, e.reason instanceof Error ? e.reason : null);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
